<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LinkForge | 智能多窗口链接管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0B1120, #030712);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #E9F1FC;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #8B9BFF, #5B7EFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header p {
            margin-top: 0.6rem;
            font-size: 1rem;
            color: #94A3B8;
            border-bottom: 1px dashed #2D3A5E;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* 添加卡片 */
        .add-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 98, 130, 0.4);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-field {
            flex: 3;
            min-width: 200px;
        }

        .count-field {
            flex: 1;
            min-width: 140px;
        }

        .add-btn {
            flex: 0.5;
            min-width: 100px;
        }

        .input-field label, .count-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8CA3CF;
            margin-bottom: 0.5rem;
        }

        input, .count-control {
            width: 100%;
            background: #0F172F;
            border: 1px solid #2D3A60;
            border-radius: 1.2rem;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: #F1F5F9;
            transition: 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #5B7EFF;
            box-shadow: 0 0 0 3px rgba(91, 126, 255, 0.3);
        }

        .count-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.2rem 0.5rem;
        }

        .count-control span {
            font-size: 1.2rem;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .count-btn {
            background: #1E2A47;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #CBD5E1;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .count-btn:hover {
            background: #2D3E6E;
            color: white;
        }

        button.primary {
            background: linear-gradient(100deg, #5B7EFF, #3B5FEE);
            border: none;
            border-radius: 1.8rem;
            padding: 0.8rem 1.4rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 4px 12px rgba(59, 95, 238, 0.3);
        }

        button.primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(100deg, #6E8CFF, #4A6CF0);
            box-shadow: 0 10px 20px rgba(59, 95, 238, 0.4);
        }

        /* 链接列表区域 */
        .links-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0.5rem 0.8rem 1rem 0.8rem;
        }

        .links-header h2 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .stats-badge {
            background: #111827;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #A0B3D9;
            border: 0.5px solid #2D3A5E;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 链接卡片 */
        .link-item {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(51, 75, 110, 0.6);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            transition: all 0.2s;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .link-item:hover {
            background: rgba(26, 36, 62, 0.8);
            border-color: #5B7EFF;
            transform: scale(1.003);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
        }

        .link-info {
            flex: 4;
            min-width: 200px;
            overflow: hidden;
        }

        .link-url {
            font-size: 1rem;
            font-weight: 500;
            color: #E2E8F0;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .link-url a {
            color: #9BB5FF;
            text-decoration: none;
            border-bottom: 1px dashed #4A6A9E;
        }

        .link-url a:hover {
            color: white;
            border-bottom-color: #5B7EFF;
        }

        .link-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: #6D7B9A;
        }

        .link-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            background: #0B1022;
            border-radius: 2rem;
            padding: 0.2rem 0.4rem;
            gap: 0.3rem;
            border: 1px solid #2A3A60;
        }

        .qty-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #BDD3FF;
            cursor: pointer;
            border-radius: 2rem;
            transition: 0.1s;
        }

        .qty-btn:hover {
            background: #1F2B4E;
            color: white;
        }

        .qty-value {
            font-weight: 600;
            min-width: 36px;
            text-align: center;
            font-size: 1rem;
            color: #EFF3FF;
        }

        .open-btn {
            background: #2B3C64;
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #F0F4FF;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .open-btn:hover {
            background: #5B7EFF;
            color: white;
            box-shadow: 0 2px 8px rgba(91,126,255,0.5);
            transform: scale(1.02);
        }

        .delete-btn {
            background: rgba(100, 60, 70, 0.5);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #F9ACAC;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #C24141;
            color: white;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px dashed #2D3A5E;
            color: #6F85B0;
        }

        /* 响应式 */
        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .link-item {
                flex-direction: column;
                align-items: stretch;
            }
            .link-actions {
                justify-content: flex-start;
            }
            .input-group {
                flex-direction: column;
            }
            .add-btn {
                width: 100%;
            }
        }

        /* 小点缀 */
        .glow-text {
            font-size: 0.7rem;
            text-align: right;
            margin-top: 2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ LinkForge</h1>
        <p>多窗口启动器 · 批量唤醒链接</p>
    </div>

    <div class="add-card">
        <div class="input-group">
            <div class="input-field">
                <label>🔗 网址链接</label>
                <input type="url" id="urlInput" placeholder="https:// 或 http:// 任意网址" autocomplete="off">
            </div>
            <div class="count-field">
                <label>📂 打开数量</label>
                <div class="count-control">
                    <button class="count-btn" id="decNewCount">−</button>
                    <span id="newCountValue">1</span>
                    <button class="count-btn" id="incNewCount">+</button>
                </div>
            </div>
            <div class="add-btn">
                <button class="primary" id="addLinkBtn">➕ 添加链接</button>
            </div>
        </div>
    </div>

    <div class="links-header">
        <h2>📌 我的链接库</h2>
        <div class="stats-badge" id="statsCount">0 个链接</div>
    </div>

    <div id="linksContainer" class="links-grid">
        <!-- 动态渲染链接列表 -->
        <div class="empty-state">
            ✨ 暂无链接，添加一个网址试试 ~<br>
            <span style="font-size:0.8rem;">可设置同时打开多个窗口，每个窗口独立跳转</span>
        </div>
    </div>
    <div class="glow-text">
        ⚡ 每个链接右侧的数量决定一键打开几个独立窗口 | 支持所有现代浏览器
    </div>
</div>

<script>
    // ---------- 存储 KEY ----------
    const STORAGE_KEY = 'linkforge_multiwindow_data';

    // 数据结构: [{ id, url, count }]
    let links = [];

    // 添加面板的临时数量 (独立于编辑)
    let newLinkCount = 1;

    // DOM 元素
    const urlInput = document.getElementById('urlInput');
    const newCountValueSpan = document.getElementById('newCountValue');
    const decNewCountBtn = document.getElementById('decNewCount');
    const incNewCountBtn = document.getElementById('incNewCount');
    const addLinkBtn = document.getElementById('addLinkBtn');
    const linksContainer = document.getElementById('linksContainer');
    const statsCountSpan = document.getElementById('statsCount');

    // ---------- 辅助函数 ----------
    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed)) {
                    links = parsed;
                    // 数据完整性校验: 确保每个对象有 id, url, count
                    links = links.filter(item => item && typeof item.id === 'number' && typeof item.url === 'string' && typeof item.count === 'number');
                    // 额外保证 count 不小于 1
                    links.forEach(link => {
                        if (link.count < 1) link.count = 1;
                        if (!link.url.startsWith('http://') && !link.url.startsWith('https://') && link.url.trim() !== '') {
                            // 如果是相对路径等，我们不强求，但最好提示，不破坏原有存储
                        }
                    });
                }
            } catch(e) { console.warn(e); links = []; }
        }
        if (links.length === 0) {
            // 预置示例让界面生动 (可选)
            links = [
                { id: Date.now() + 1, url: 'https://github.com', count: 2 },
                { id: Date.now() + 2, url: 'https://www.bing.com', count: 1 },
                { id: Date.now() + 3, url: 'https://www.wikipedia.org', count: 3 }
            ];
            saveToLocalStorage();
        }
        renderLinks();
    }

    // 渲染主列表
    function renderLinks() {
        if (!linksContainer) return;
        if (links.length === 0) {
            linksContainer.innerHTML = `<div class="empty-state">
                🌌 链接库为空，添加一个新的网址吧~<br>
                <span style="font-size:0.8rem;">设置数量后一键打开多个窗口</span>
            </div>`;
            statsCountSpan.innerText = `0 个链接`;
            return;
        }

        statsCountSpan.innerText = `${links.length} 个链接`;

        let html = '';
        links.forEach(link => {
            // 安全显示 url 截断
            const displayUrl = link.url.length > 60 ? link.url.substring(0, 57) + '...' : link.url;
            html += `
                <div class="link-item" data-id="${link.id}">
                    <div class="link-info">
                        <div class="link-url">
                            <span>🌐</span>
                            <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(displayUrl)}</a>
                        </div>
                        <div class="link-meta">
                            <span>🔄 单次触发: ${link.count} 个新窗口</span>
                        </div>
                    </div>
                    <div class="link-actions">
                        <div class="quantity-selector">
                            <button class="qty-btn" data-action="decr" data-id="${link.id}">−</button>
                            <span class="qty-value" data-id="${link.id}">${link.count}</span>
                            <button class="qty-btn" data-action="incr" data-id="${link.id}">+</button>
                        </div>
                        <button class="open-btn" data-action="open" data-id="${link.id}">
                            🚀 打开 ×${link.count}
                        </button>
                        <button class="delete-btn" data-action="delete" data-id="${link.id}">
                            🗑️
                        </button>
                    </div>
                </div>
            `;
        });
        linksContainer.innerHTML = html;
        // 绑定动态事件 (事件委托)
        attachLinkEvents();
    }

    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 事件委托处理数量加减，打开，删除
    function attachLinkEvents() {
        // 使用事件监听器绑定在容器上
        linksContainer.removeEventListener('click', handleLinkContainerClick);
        linksContainer.addEventListener('click', handleLinkContainerClick);
    }

    function handleLinkContainerClick(e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const idStr = btn.getAttribute('data-id');
        if (!idStr) return;
        const id = parseInt(idStr, 10);
        const linkItem = links.find(l => l.id === id);
        if (!linkItem) return;

        if (action === 'decr') {
            // 减少数量，最小为1
            let newCount = linkItem.count - 1;
            if (newCount < 1) newCount = 1;
            if (linkItem.count !== newCount) {
                linkItem.count = newCount;
                saveToLocalStorage();
                renderLinks(); // 刷新UI
            }
        } 
        else if (action === 'incr') {
            let newCount = linkItem.count + 1;
            // 上限 50，防止恶意过大的弹窗（浏览器会拦截过多弹窗，但为避免误操作设上限50）
            if (newCount > 50) newCount = 50;
            if (linkItem.count !== newCount) {
                linkItem.count = newCount;
                saveToLocalStorage();
                renderLinks();
            }
        }
        else if (action === 'open') {
            // 打开 linkItem.count 个新窗口，全部指向 linkItem.url
            const urlToOpen = linkItem.url.trim();
            if (!urlToOpen) {
                showToast('⚠️ 网址无效', 1500);
                return;
            }
            // 简单验证 url 格式: 如果没有协议，默认加上 https:// 更友好
            let finalUrl = urlToOpen;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }
            const count = linkItem.count;
            if (count <= 0) return;

            // 由于现代浏览器会阻止过多的同步弹窗, 异步依次打开较好且稳定, 同时防止被拦截需要用户交互触发(点击已触发，安全)
            // 为避免浏览器阻止新窗口群发, 使用间歇性逐个打开，同时确保不是循环阻塞
            // 注意: 部分浏览器可能限制同时打开数量，但这是用户主动点击，而且逐个打开有间隔会更稳定。
            let opened = 0;
            function openWindow() {
                if (opened >= count) return;
                // 第二个参数 _blank, 每次使用不同的窗口名防止复用?
                // 使用随机窗口名确保每次都开新窗口，实现多窗口目的
                const winName = `linkforge_win_${Date.now()}_${Math.random()}_${opened}`;
                window.open(finalUrl, winName, 'noopener,noreferrer');
                opened++;
                if (opened < count) {
                    setTimeout(openWindow, 80); // 间隔80ms 防止被判定为垃圾弹窗，也保证新窗口独立性
                } else {
                    showToast(`✅ 已打开 ${count} 个窗口: ${linkItem.url.substring(0, 40)}`, 2000);
                }
            }
            openWindow();
        }
        else if (action === 'delete') {
            if (confirm(`确定要删除链接 “${linkItem.url.substring(0, 60)}” 吗？`)) {
                const index = links.findIndex(l => l.id === id);
                if (index !== -1) {
                    links.splice(index, 1);
                    saveToLocalStorage();
                    renderLinks();
                    showToast('🗑️ 链接已移除', 1000);
                }
            }
        }
    }

    // 简易toast提示（轻提示，不用第三方）
    let toastTimeout = null;
    function showToast(msg, duration = 1800) {
        let toastEl = document.getElementById('dynamicToast');
        if (!toastEl) {
            toastEl = document.createElement('div');
            toastEl.id = 'dynamicToast';
            toastEl.style.position = 'fixed';
            toastEl.style.bottom = '20px';
            toastEl.style.left = '50%';
            toastEl.style.transform = 'translateX(-50%)';
            toastEl.style.backgroundColor = '#1E293B';
            toastEl.style.backdropFilter = 'blur(12px)';
            toastEl.style.color = '#EFF3FF';
            toastEl.style.padding = '0.7rem 1.5rem';
            toastEl.style.borderRadius = '40px';
            toastEl.style.fontSize = '0.85rem';
            toastEl.style.fontWeight = '500';
            toastEl.style.border = '1px solid #5B7EFF';
            toastEl.style.boxShadow = '0 8px 20px rgba(0,0,0,0.4)';
            toastEl.style.zIndex = '9999';
            toastEl.style.whiteSpace = 'nowrap';
            toastEl.style.fontFamily = 'inherit';
            document.body.appendChild(toastEl);
        }
        if (toastTimeout) clearTimeout(toastTimeout);
        toastEl.textContent = msg;
        toastEl.style.opacity = '1';
        toastEl.style.transition = 'opacity 0.2s';
        toastTimeout = setTimeout(() => {
            toastEl.style.opacity = '0';
        }, duration);
    }

    // 添加新链接
    function addNewLink() {
        let rawUrl = urlInput.value.trim();
        if (rawUrl === "") {
            showToast("❓ 请输入网址链接", 1200);
            return;
        }
        // 智能补齐协议
        let finalUrl = rawUrl;
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            finalUrl = 'https://' + finalUrl;
        }
        // 简单校验域名基本合法性(正则简单验证)
        const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
        // 更精确可放宽，但做个基本检查
        const hostCheck = finalUrl.match(/^(https?:\/\/[^\/]+)/i);
        if (!hostCheck) {
            showToast("⚠️ 网址格式无效，请包含有效域名", 1500);
            return;
        }
        // 获取新链接的数量
        let countToAdd = newLinkCount;
        if (countToAdd < 1) countToAdd = 1;
        if (countToAdd > 50) countToAdd = 50;

        // 检查重复（可选，但不强制，允许重复添加相同链接）
        const newId = Date.now();
        links.push({
            id: newId,
            url: finalUrl,
            count: countToAdd
        });
        saveToLocalStorage();
        renderLinks();
        // 清空输入框并重置数量为1（为了体验，保留上次数量也可以但重置比较干净）
        urlInput.value = '';
        // 重置添加面板数量为1
        newLinkCount = 1;
        updateNewCountDisplay();
        showToast(`✨ 已添加链接，默认打开次数 ${countToAdd}`, 1600);
        urlInput.focus();
    }

    function updateNewCountDisplay() {
        newCountValueSpan.innerText = newLinkCount;
    }

    // 增加减少添加面板数量
    function incNewCount() {
        if (newLinkCount < 50) {
            newLinkCount++;
            updateNewCountDisplay();
        } else {
            showToast("最大支持单次打开50个窗口", 1000);
        }
    }
    function decNewCount() {
        if (newLinkCount > 1) {
            newLinkCount--;
            updateNewCountDisplay();
        }
    }

    // 绑定UI添加面板事件
    function bindAddPanelEvents() {
        incNewCountBtn.addEventListener('click', incNewCount);
        decNewCountBtn.addEventListener('click', decNewCount);
        addLinkBtn.addEventListener('click', addNewLink);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addNewLink();
            }
        });
    }

    // 初始化
    function init() {
        bindAddPanelEvents();
        loadFromLocalStorage();
    }

    init();
</script>
</body>
</html>
