<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>2026年4月 · 月度总结 | 时光叙事</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05070a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            background-image: radial-gradient(rgba(80, 100, 160, 0.12) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(60, 80, 140, 0.2), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .report-container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(20, 25, 45, 0.75);
            backdrop-filter: blur(10px);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(100, 130, 240, 0.3);
            color: #c0ceff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
            margin-bottom: 2rem;
        }

        .back-home:hover {
            background: rgba(55, 70, 120, 0.9);
            border-color: rgba(150, 180, 255, 0.6);
            transform: translateX(-4px);
            color: white;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .month-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3a4c8c, #5f7bc0);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #eef3ff, #8aa2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: rgba(12, 15, 22, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.8rem 2rem;
            margin-bottom: 1.8rem;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #eef3ff;
            margin-bottom: 1.5rem;
            border-left: 4px solid #6d86e0;
            padding-left: 1rem;
        }

        .card-title i {
            color: #8aa2ff;
        }

        .output-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: rgba(25, 30, 48, 0.6);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0ceff, #a0b4f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .stat-label {
            color: #9aa9ce;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(100, 130, 240, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #b8cbff;
        }

        .detail-text {
            color: #b8c4e6;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.08);
            padding-top: 0.5rem;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(20, 24, 38, 0.5);
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
        }

        .list-icon {
            width: 36px;
            height: 36px;
            background: rgba(100, 130, 240, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8aa2ff;
        }

        .list-title {
            font-weight: 600;
            color: #eef3ff;
        }

        .list-desc {
            font-size: 0.8rem;
            color: #9aa9ce;
        }

        .progress-item {
            margin-bottom: 1.2rem;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #c0ceff;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(30, 35, 55, 0.8);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #5f7bc0, #8aa2ff);
            width: 0%;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5f6b8a;
        }

        hr {
            border-color: rgba(255,255,255,0.05);
            margin: 1rem 0;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .card { padding: 1.2rem; }
            .page-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="report-container">
    <a href="https://xshzl.github.io/lcyzl/" class="back-home">
        <i class="fas fa-arrow-left"></i> 返回主页
    </a>

    <div class="page-header">
        <div class="month-badge">2026年4月 · 月度总结</div>
        <h1>科研数据检验 · 工作复盘</h1>
    </div>

    <!-- 产出部分 -->
    <div class="card">
        <div class="card-title">
            <i class="fas fa-chart-line"></i>
            <span>产出</span>
        </div>
        <div class="output-grid">
            <div class="stat-card">
                <div class="stat-number">145</div>
                <div class="stat-label">科研数据字段 <span class="badge">全量检验</span></div>
                <div class="detail-text">检查并进行分析错误</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">110</div>
                <div class="stat-label">问题字段 <span class="badge">存在问题</span></div>
                <div class="detail-text">证据：IDEA 有相关 SQL 内容</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">281</div>
                <div class="stat-label">SQL 代码 <span class="badge">行</span></div>
                <div class="detail-text">数据检验与分析</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">388</div>
                <div class="stat-label">Python 脚本 <span class="badge">行</span></div>
                <div class="detail-text">自动化分析处理</div>
            </div>
        </div>
    </div>

    <!-- 项目及任务 -->
    <div class="card">
        <div class="card-title">
            <i class="fas fa-briefcase"></i>
            <span>项目及任务</span>
        </div>
        <div class="item-list">
            <div class="list-item">
                <div class="list-icon"><i class="fas fa-gavel"></i></div>
                <div class="list-content">
                    <div class="list-title">西安理工大学 · 投标事宜</div>
                    <div class="list-desc">参与投标相关工作</div>
                </div>
            </div>
            <div class="list-item">
                <div class="list-icon"><i class="fas fa-exchange-alt"></i></div>
                <div class="list-content">
                    <div class="list-title">ETL 任务</div>
                    <div class="list-desc">完成 2 个 ETL 任务</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 学习进度 -->
    <div class="card">
        <div class="card-title">
            <i class="fas fa-graduation-cap"></i>
            <span>学习进度</span>
        </div>
        <div class="progress-item">
            <div class="progress-label">
                <span>平台熟悉程度 (以 e1, e2 级别为标准)</span>
                <span>90%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: 90%;"></div></div>
        </div>
        <div class="progress-item">
            <div class="progress-label">
                <span>通识类技能</span>
                <span>80%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: 80%;"></div></div>
        </div>
        <div class="item-list" style="margin-top: 1rem;">
            <div class="list-item">
                <div class="list-icon"><i class="fas fa-file-signature"></i></div>
                <div class="list-content">
                    <div class="list-title">公司投标全流程</div>
                    <div class="list-desc">已了解公司投标全流程</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-note">
        2026年4月 · 科研数据检验 | 西安理工大学投标 | ETL 任务
    </div>
</div>
</body>
</html>
