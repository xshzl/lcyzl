<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>2026年4月 · 月度总结</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05070a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            background-image: radial-gradient(rgba(80, 100, 160, 0.12) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(60, 80, 140, 0.2), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .report-container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(20, 25, 45, 0.75);
            backdrop-filter: blur(10px);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(100, 130, 240, 0.3);
            color: #c0ceff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            /* transition: all 0.25s ease; */
            margin-bottom: 2rem;
        }

        .back-home:hover {
            background: rgba(55, 70, 120, 0.9);
            border-color: rgba(150, 180, 255, 0.6);
            transform: translateX(-4px);
            color: white;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .month-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3a4c8c, #5f7bc0);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #eef3ff, #8aa2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: rgba(12, 15, 22, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.8rem 2rem;
            margin-bottom: 1.8rem;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #eef3ff;
            margin-bottom: 1.5rem;
            border-left: 4px solid #6d86e0;
            padding-left: 1rem;
        }

        .card-title i {
            color: #8aa2ff;
        }

        .output-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: rgba(25, 30, 48, 0.6);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            /* transition: all 0.2s ease; */
        }

        .stat-card:hover {
            background: rgba(45, 55, 85, 0.8);
            transform: translateY(-3px);
            border-color: rgba(100, 130, 240, 0.4);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0ceff, #a0b4f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .stat-label {
            color: #9aa9ce;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(100, 130, 240, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #b8cbff;
        }

        .detail-text {
            color: #b8c4e6;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.08);
            padding-top: 0.5rem;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(20, 24, 38, 0.5);
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
        }

        .list-icon {
            width: 36px;
            height: 36px;
            background: rgba(100, 130, 240, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8aa2ff;
        }

        .list-title {
            font-weight: 600;
            color: #eef3ff;
        }

        .list-desc {
            font-size: 0.8rem;
            color: #9aa9ce;
        }

        .progress-item {
            margin-bottom: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 1rem;
            /* transition: all 0.2s ease; */
        }

        .progress-item:hover {
            background: rgba(45, 55, 85, 0.4);
            transform: translateX(4px);
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #c0ceff;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(30, 35, 55, 0.8);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #5f7bc0, #8aa2ff);
            width: 0%;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5f6b8a;
        }

        /* 模态框样式 - 字段列表 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            /* transition: all 0.2s ease; */
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: #0f1220;
            border-radius: 1.5rem;
            max-width: 750px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .modal-container h3 {
            color: white;
            margin-bottom: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
            position: sticky;
            top: 0;
            background: #0f1220;
            z-index: 10;
        }

        .modal-container h3 i {
            color: #8aa2ff;
        }

        .field-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            color: #b8c4e6;
        }

        .field-group {
            background: rgba(25, 30, 48, 0.5);
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .table-name {
            color: #8aa2ff;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            border-left: 2px solid #6d86e0;
            padding-left: 0.6rem;
        }

        .field-item {
            padding: 0.2rem 0 0.2rem 1.5rem;
            color: #c0ceff;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .close-modal {
            background: rgba(100, 130, 240, 0.2);
            border: 1px solid rgba(100, 130, 240, 0.4);
            color: #c0ceff;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 1.2rem;
            width: fit-content;
        }

        .close-modal:hover {
            background: rgba(100, 130, 240, 0.4);
        }

        /* 居中提示弹窗 - 通用内容弹窗 */
        .alert-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            /* transition: all 0.2s ease; */
        }

        .alert-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .alert-card {
            background: #0f1220;
            border-radius: 1.5rem;
            max-width: 650px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.8rem;
            border: 1px solid rgba(100, 130, 240, 0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .alert-card h3 {
            color: white;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
            position: sticky;
            top: 0;
            background: #0f1220;
            z-index: 10;
        }

        .alert-card h3 i {
            color: #8aa2ff;
        }

        .alert-content {
            color: #c0ceff;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .alert-content ul, .alert-content ol {
            padding-left: 1.5rem;
            margin: 0.5rem 0;
        }

        .alert-content li {
            margin: 0.3rem 0;
        }

        .alert-content p {
            margin: 0.5rem 0;
        }

        .alert-content h4 {
            color: #8aa2ff;
            margin: 0.8rem 0 0.3rem 0;
        }

        .alert-card button {
            background: linear-gradient(135deg, #3a4c8c, #5f7bc0);
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            /* transition: all 0.2s; */
            margin-top: 0.5rem;
        }

        .alert-card button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .card { padding: 1.2rem; }
            .page-header h1 { font-size: 1.8rem; }
            .modal-container { padding: 1.2rem; }
            .alert-card { padding: 1.2rem; }
            .alert-content { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="report-container">
    <a href="https://xshzl.github.io/lcyzl/" class="back-home">

    <div class="page-header">
        <div class="month-badge">2026年4月 · 月度总结</div>

    <!-- 产出部分 -->
    <div class="card">
        <div class="card-title">
            <i class="fas fa-chart-line"></i>

        <div class="output-grid">

        <div class="item-list">

        <div class="progress-item" id="platformProgress">
            <div class="progress-label">
                <span>平台熟悉程度 (以 e1, e2 级别为标准)</span>

            </div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: 90%;"></div></div>
        </div>
        <div class="progress-item" id="generalSkill">
            <div class="progress-label">
                <span>通识类技能</span>
                <span>80%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: 80%;"></div></div>
        </div>
        <div class="item-list" style="margin-top: 1rem;">
            <div class="list-item">
                <div class="list-icon"><i class="fas fa-file-signature"></i></div>
                <div class="list-content">

    <div class="footer-note">
        2026年4月 · 科研数据检验 | 西安理工大学投标 | ETL 任务

<!-- 模态框 - 用于显示字段列表 -->
<div id="fieldModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-database"></i> 科研数据字段详情 (145个字段)</h3>
        <div class="field-list" id="fieldList"></div>
        <div class="close-modal" onclick="closeModal()">关闭</div>
    </div>
</div>

<!-- 内容弹窗 - 用于显示详细技能/知识内容 -->
<div id="contentModal" class="alert-modal">
    <div class="alert-card">
        <h3 id="contentModalTitle"><i class="fas fa-code"></i> 详细信息</h3>
        <div id="contentModalBody" class="alert-content"></div>
        <button onclick="closeContentModal()">关闭</button>
    </div>
</div>

<script>
    // 字段数据（按表分组，不重复显示表名）
    const fieldGroups = [
        {
            table: "dwd_kxyj_教职工参与科研项目",
            fields: [
                "教职工号", "项目名称", "项目类别", "项目类型名称", "项目类型代码",
                "项目编号", "科技项目类别名称", "科技项目类别代码", "项目级别名称",
                "项目级别代码", "项目来源单位", "项目来源名称", "项目来源代码",
                "项目执行状态名称", "项目执行状态代码", "贡献率", "署名顺序",
                "参与日期", "参与状态", "是否项目负责人", "立项日期", "结项日期", "项目经费总额"
            ]
        },
        {
            table: "dwd_kxyj_教职工发表论文",
            fields: [
                "教职工号", "论文编号", "论文名称", "论文类型名称", "论文类型代码",
                "收录类别名称", "收录类别代码", "学校署名名称", "学校署名代码",
                "论文发表类型名称", "论文发表类型代码", "刊物级别名称", "刊物级别代码",
                "刊物名称", "发表日期", "署名顺序", "贡献率", "是否通讯作者名称",
                "是否通讯作者代码", "是否第一作者名称", "是否第一作者代码", "SCI", "ESI"
            ]
        },
        {
            table: "dwd_kxyj_教职工发明专利",
            fields: [
                "教职工号", "专利编号", "专利名称", "专利类型名称", "专利类型代码",
                "专利状态名称", "专利状态代码", "专利授权公告号", "专利授权公告日期",
                "是否本校专利名称", "是否本校专利代码", "是否PCT专利名称", "是否PCT专利代码",
                "专利国家名称", "专利国家代码", "贡献率", "发明人排名", "是否本校第一发明人"
            ]
        },
        {
            table: "dwd_kxyj_教职工出版著作",
            fields: [
                "教职工号", "著作编号", "著作名称", "出版社名称", "出版社级别名称",
                "出版社级别代码", "出版社所在国家地区", "出版日期", "论著类别名称",
                "论著类别代码", "学校署名名称", "学校署名代码", "署名顺序", "贡献率",
                "是否第一作者名称", "是否第一作者代码", "是否本校第一作者名称", "是否本校第一作者代码"
            ]
        },
        {
            table: "dwd_kxyj_教职工发表计算机软件著作权",
            fields: [
                "教职工号", "软件著作名称", "证书号", "登记号", "著作权人", "署名顺序",
                "首次发表日期", "证书取得日期", "证书颁发机构", "权利取得方式名称", "权利取得方式代码"
            ]
        },
        {
            table: "dwd_kxyj_教职工科研获奖",
            fields: [
                "教职工号", "获奖成果类型名称", "获奖成果类型代码", "获奖成果编号", "获奖成果名称",
                "奖励名称", "获奖类别名称", "获奖类别代码", "获奖级别名称", "获奖级别代码",
                "获奖等级名称", "获奖等级代码", "获奖日期", "获奖金额", "单位排名", "署名顺序"
            ]
        }
    ];

    // 渲染字段列表到模态框
    function renderFieldList() {
        const container = document.getElementById('fieldList');
        if (!container) return;
        container.innerHTML = '';
        fieldGroups.forEach(group => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'field-group';
            groupDiv.innerHTML = `<div class="table-name">📁 ${group.table}</div>`;
            group.fields.forEach(field => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'field-item';
                fieldDiv.innerHTML = `<i class="fas fa-caret-right" style="font-size: 0.6rem; margin-right: 0.4rem; color:#8aa2ff;"></i> ${field}`;
                groupDiv.appendChild(fieldDiv);
            });
            container.appendChild(groupDiv);
        });
    }

    // 字段列表模态框
    const fieldModal = document.getElementById('fieldModal');
    function openModal() {
        renderFieldList();
        fieldModal.classList.add('active');
    }
    function closeModal() {
        fieldModal.classList.remove('active');
    }
    window.closeModal = closeModal;
    fieldModal.addEventListener('click', (e) => {
        if (e.target === fieldModal) closeModal();
    });

    // 内容弹窗
    const contentModal = document.getElementById('contentModal');
    const contentModalTitle = document.getElementById('contentModalTitle');
    const contentModalBody = document.getElementById('contentModalBody');
    
    function openContentModal(title, htmlContent) {
        contentModalTitle.innerHTML = title;
        contentModalBody.innerHTML = htmlContent;
        contentModal.classList.add('active');
    }
    
    function closeContentModal() {
        contentModal.classList.remove('active');
    }
    window.closeContentModal = closeContentModal;
    contentModal.addEventListener('click', (e) => {
        if (e.target === contentModal) closeContentModal();
    });

    // 平台熟悉程度详细内容
    const platformContent = `
        <h4>📝 一、笔试部分</h4>
        <ul>
            <li>掌握关系型数据库的概念、原理</li>
