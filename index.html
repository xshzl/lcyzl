<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>格言双生 · 时光叙事 & 快捷工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #05070a;
            background-image: linear-gradient(rgba(30, 35, 50, 0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(30, 35, 50, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(40, 45, 70, 0.3), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========= 页面容器 ========= */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2rem;
            /* transition: transform 0.3s ease-out; */
        }

        /* 中间主页 */
        .page-home {
            z-index: 10;
            transform: translateX(0);
        }

        /* 右侧页面（时光叙事） */
        .page-timeline {
            z-index: 5;
            transform: translateX(100%);
            background: #05070a;
        }

        /* 左侧页面（快捷工具箱） */
        .page-tools {
            z-index: 5;
            transform: translateX(-100%);
            background: #05070a;
        }

        /* 显示右侧页面 */
        body.show-timeline .page-home {
            transform: translateX(-100%);
            pointer-events: none;
        }
        body.show-timeline .page-timeline {
            transform: translateX(0);
            z-index: 15;
            pointer-events: auto;
        }

        /* 显示左侧页面 */
        body.show-tools .page-home {
            transform: translateX(100%);
            pointer-events: none;
        }
        body.show-tools .page-tools {
            transform: translateX(0);
            z-index: 15;
            pointer-events: auto;
        }

        /* 滚动条 */
        .page::-webkit-scrollbar { width: 6px; }
        .page::-webkit-scrollbar-track { background: #1a1e2a; }
        .page::-webkit-scrollbar-thumb { background: #4f5b8c; border-radius: 8px; }

        /* 通用返回箭头 */
        .back-arrow {
            position: fixed;
            top: 2rem;
            width: 52px;
            height: 52px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* transition: all 0.2s ease; */
            border: 1px solid rgba(100, 130, 240, 0.4);
            z-index: 100;
        }
        .back-arrow:hover { transform: scale(1.05); background: rgba(55, 70, 120, 0.9); }
        .back-arrow i { font-size: 1.5rem; color: #c0ceff; }

        /* 右侧页面返回箭头在左边 */
        .timeline-back {
            left: 2rem;
        }
        /* 左侧页面返回箭头在右边 */
        .tools-back {
            right: 2rem;
        }

        /* ========= 格言卡片 ========= */
        .quotes-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding-top: 2rem;
        }

        .quote-card {
            background: rgba(12, 15, 22, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8);
            padding: 2.5rem 2rem;
            /* transition: background 0.25s ease; */
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 2rem;
            cursor: pointer;
        }
        .quote-card:last-child { margin-bottom: 0; }
        .quote-card:hover {
            background: rgba(20, 24, 34, 0.92);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .quote-icon { font-size: 2.8rem; color: rgba(150, 170, 220, 0.5); margin-bottom: 1rem; }
        .quote-text { font-size: 1.75rem; font-weight: 500; line-height: 1.4; color: #f5f7ff; margin: 1.2rem 0 1rem 0; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3); }
        .quote-divider { width: 70px; height: 3px; background: linear-gradient(90deg, #5f7bc0, #8aa2ff); border-radius: 4px; margin: 1rem 0 1.2rem 0; }
        .quote-meta { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: #9aa9ce; opacity: 0.7; }
        .quote-author {
            text-align: right;
            font-size: 0.85rem;
            color: #8aa2ff;
            margin-top: 0.8rem;
            opacity: 0.7;
            font-style: italic;
            letter-spacing: 0.5px;
        }
        .quote-card:hover .quote-author {
            opacity: 1;
            color: #b8cbff;
        }

        /* 左右箭头入口 */
        .nav-arrow {
            position: fixed;
            bottom: 2rem;
            width: 68px;
            height: 68px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* transition: all 0.2s ease; */
            border: 1px solid rgba(100, 130, 240, 0.5);
            z-index: 100;
        }
        .nav-arrow:hover { transform: scale(1.05); background: rgba(55, 70, 120, 0.95); }
        .nav-arrow i { font-size: 2rem; color: #c0ceff; }

        /* 右侧箭头 */
        .arrow-right {
            right: 2rem;
        }
        /* 左侧箭头 */
        .arrow-left {
            left: 2rem;
        }

        .arrow-label {
            position: fixed;
            bottom: 2.8rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #c0ceff;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            /* transition: opacity 0.25s; */
        }
        .nav-arrow:hover + .arrow-label { opacity: 1; }
        .label-right { right: 6rem; }
        .label-left { left: 6rem; }

        /* ========= 管理页面通用样式 ========= */
        .manager-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 4rem 1rem 2rem;
        }
        .manager-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .manager-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c0ceff, #8aa2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .add-btn {
            background: rgba(100, 130, 240, 0.2);
            border: 1px solid rgba(100, 130, 240, 0.5);
            color: #b8cbff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
            /* transition: all 0.2s; */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .add-btn:hover { background: rgba(100, 130, 240, 0.5); color: white; transform: scale(1.02); }

        .cards-list { display: flex; flex-direction: column; gap: 1rem; }
        .card-item {
            background: rgba(25, 30, 45, 0.6);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            transform-style: preserve-3d;
            perspective: 800px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            /* transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); */
            transform-style: preserve-3d;
            border-radius: 1.2rem;
        }
        .card-item.flipping .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-front { background: rgba(25, 30, 45, 0.8); transform: rotateY(0deg); }
        .card-back {
            background: rgba(55, 65, 95, 0.95);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotateY(180deg);
            justify-content: center;
            gap: 0.8rem;
        }
        .card-label { font-weight: 600; font-size: 1rem; color: #eef3ff; display: flex; align-items: center; gap: 8px; }
        .card-label i { color: #8aa2ff; }
        .edit-icon, .delete-icon { color: #9aa9ce; cursor: pointer; padding: 6px; border-radius: 8px; 
            /* transition: all 0.2s;  */
        }
        .edit-icon:hover, .delete-icon:hover { background: rgba(100, 130, 240, 0.3); color: white; }
        .delete-icon:hover { color: #ff8a7a; }
        .card-back span { font-size: 0.85rem; color: #ccd6ff; }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            /* transition: all 0.2s ease; */
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: #0f1220;
            border-radius: 2rem;
            max-width: 450px;
            width: 90%;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-container h3 { color: white; margin-bottom: 1.5rem; }
        .modal-container input {
            width: 100%;
            background: rgba(30, 35, 55, 0.9);
            border: 1px solid #2c3145;
            padding: 12px 16px;
            border-radius: 1rem;
            color: white;
            margin-bottom: 1.2rem;
            outline: none;
        }
        .modal-container input:focus { border-color: #6d86e0; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 1rem; }
        .modal-buttons button {
            padding: 8px 18px;
            border-radius: 40px;
            background: transparent;
            border: 1px solid #4f5b8c;
            color: #ccd6ff;
            cursor: pointer;
        }
        .modal-buttons button.primary { background: #3a4c8c; border-color: #8aa2ff; color: white; }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #11131fcc;
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            color: #eef3ff;
            font-size: 0.85rem;
            z-index: 300;
            pointer-events: none;
            /* transition: opacity 0.2s; */
        }
        @media (max-width: 700px) {
            .quote-text { font-size: 1.45rem; }
            .manager-container { padding: 5rem 1rem 2rem; }
            .nav-arrow { width: 56px; height: 56px; }
            .back-arrow { width: 44px; height: 44px; top: 1.5rem; }
            .arrow-right { right: 1.5rem; bottom: 1.5rem; }
            .arrow-left { left: 1.5rem; bottom: 1.5rem; }
            .label-right { right: 5rem; bottom: 2.2rem; }
            .label-left { left: 5rem; bottom: 2.2rem; }
            .timeline-back { left: 1.5rem; top: 1.5rem; }
            .tools-back { right: 1.5rem; top: 1.5rem; }
        }
    </style>
</head>
<body>

<!-- ==================== 页面1：中间主页（双生格言） ==================== -->
<div class="page page-home">
    <div class="quotes-container">
        <div class="quote-card" id="card1">
            <div class="quote-icon"><i class="fas fa-hand-sparkles"></i></div>
            <div class="quote-text">“总有一天，我不会让我的双脚站在油污的地板上”</div>
            <div class="quote-divider"></div>
            <div class="quote-meta"><i class="fas fa-feather-alt"></i><span>蜕 变 · 净 土 宣 言</span></div>
            <div class="quote-author">—— 章鱼哥</div>
        </div>
        <div class="quote-card" id="card2">
            <div class="quote-icon"><i class="fas fa-dice-d6"></i></div>
            <div class="quote-text">“人的本质是赌徒，不赌其实是在赌自己输”</div>
            <div class="quote-divider"></div>
            <div class="quote-meta"><i class="fas fa-brain"></i><span>博 弈 · 存 在 边 界</span></div>
            <div class="quote-author">—— 高桥凉介</div>
        </div>
    </div>
    <!-- 左侧箭头：快捷工具箱（滑出） -->
    <div class="nav-arrow arrow-left" id="gotoToolsBtn">
        <i class="fas fa-toolbox"></i>
    </div>
    <div class="arrow-label label-left">快捷工具箱</div>
    <!-- 右侧箭头：时光叙事（滑出） -->
    <div class="nav-arrow arrow-right" id="gotoTimelineBtn">
        <i class="fas fa-arrow-right"></i>
    </div>
    <div class="arrow-label label-right">时光叙事</div>
</div>

<!-- ==================== 页面2：右侧页面（时光叙事） ==================== -->
<div class="page page-timeline">
    <div class="back-arrow timeline-back" id="backFromTimelineBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    <div class="manager-container">
        <div class="manager-header">
            <h2><i class="fas fa-calendar-alt"></i> 时光叙事</h2>
            <div class="add-btn" id="openTimelineModalBtn"><i class="fas fa-plus"></i></div>
        </div>
        <div class="cards-list" id="timelineList"></div>
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.7rem; color: #5f6b8a;">
            <i class="fas fa-arrows-spin"></i> 点击卡片翻页后自动跳转
        </div>
    </div>
</div>

<!-- ==================== 页面3：左侧页面（快捷工具箱） ==================== -->
<div class="page page-tools">
    <div class="back-arrow tools-back" id="backFromToolsBtn">
        <i class="fas fa-arrow-right"></i>
    </div>
    <div class="manager-container">
        <div class="manager-header">
            <h2><i class="fas fa-toolbox"></i> 快捷工具箱</h2>
            <div class="add-btn" id="openToolsModalBtn"><i class="fas fa-plus"></i></div>
        </div>
        <div class="cards-list" id="toolsList"></div>
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.7rem; color: #5f6b8a;">
            <i class="fas fa-arrow-up-right-from-square"></i> 点击卡片翻页后在新标签页打开
        </div>
    </div>
</div>

<!-- 共用模态框 -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <h3 id="modalTitle">➕ 添加卡片</h3>
        <input type="text" id="cardNameInput" placeholder="名称, 例如: 格式转换工具" autocomplete="off">
        <input type="text" id="cardUrlInput" placeholder="跳转链接, 例如: https://..." autocomplete="off">
        <div class="modal-buttons">
            <button id="modalCancelBtn">取消</button>
            <button id="modalConfirmBtn" class="primary">确认</button>
        </div>
    </div>
</div>

<script>
    // ==================== 页面切换 ====================
    const gotoTimelineBtn = document.getElementById('gotoTimelineBtn');
    const backFromTimelineBtn = document.getElementById('backFromTimelineBtn');
    const gotoToolsBtn = document.getElementById('gotoToolsBtn');
    const backFromToolsBtn = document.getElementById('backFromToolsBtn');
    
    gotoTimelineBtn.addEventListener('click', () => {
        document.body.classList.add('show-timeline');
        document.body.classList.remove('show-tools');
    });
    backFromTimelineBtn.addEventListener('click', () => {
        document.body.classList.remove('show-timeline');
    });
    
    gotoToolsBtn.addEventListener('click', () => {
        document.body.classList.add('show-tools');
        document.body.classList.remove('show-timeline');
    });
    backFromToolsBtn.addEventListener('click', () => {
        document.body.classList.remove('show-tools');
    });

    // ==================== 通用卡片管理类 ====================
    class CardManager {
        constructor(storageKey, containerId, openModalBtnId, openInNewTab = false) {
            this.storageKey = storageKey;
            this.container = document.getElementById(containerId);
            this.openModalBtn = document.getElementById(openModalBtnId);
            this.openInNewTab = openInNewTab;  // 是否在新标签页打开
            this.items = [];
            this.editingId = null;
            this.init();
        }

        init() {
            this.loadData();
            this.openModalBtn.addEventListener('click', () => this.openAddModal());
        }

        showToast(msg, duration = 2000) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, duration);
        }

        saveData() {
            localStorage.setItem(this.storageKey, JSON.stringify(this.items));
        }

        loadData() {
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
                try { this.items = JSON.parse(stored); } catch(e) { this.items = []; }
            }
            if (this.items.length === 0) {
                // 快捷工具箱预置两个链接
                if (this.storageKey === 'quick_tools') {
                    this.items.push({ id: 'tool1', label: '格式转换工具', url: 'https://xshzl.github.io/lcyzl/zhuanhuan.html' });
                    this.items.push({ id: 'tool2', label: 'Null工具', url: 'https://xshzl.github.io/lcyzl/null.html' });
                    this.saveData();
                }
            }
            this.render();
        }

        render() {
            if (!this.container) return;
            this.container.innerHTML = '';
            if (this.items.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'card-item';
                emptyDiv.style.padding = '1rem';
                emptyDiv.style.textAlign = 'center';
                emptyDiv.innerHTML = '<span style="opacity:0.6;">✨ 暂无卡片，点击 + 添加</span>';
                this.container.appendChild(emptyDiv);
                return;
            }
            this.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card-item';
                const inner = document.createElement('div');
                inner.className = 'card-inner';
                const front = document.createElement('div');
                front.className = 'card-front';
                front.innerHTML = `
                    <div class="card-label"><i class="fas fa-link"></i> ${this.escapeHtml(item.label)}</div>
                    <div style="display: flex; gap: 0.3rem;">
                        <i class="fas fa-pen edit-icon" data-action="edit"></i>
                        <i class="fas fa-trash-alt delete-icon" data-action="delete"></i>
                    </div>
                `;
                const back = document.createElement('div');
                back.className = 'card-back';
                back.innerHTML = `<i class="fas fa-arrow-right"></i><span>点击跳转</span><i class="fas fa-external-link-alt"></i>`;
                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);
                
                card.addEventListener('click', (e) => {
                    if (e.target.closest('[data-action="edit"]') || e.target.closest('[data-action="delete"]')) return;
                    
                    // 关键修复：如果是新标签页打开，不做翻页动画，直接打开
                    if (this.openInNewTab) {
                        if (item.url && item.url.trim() !== '') {
                            window.open(item.url, '_blank');
                        } else {
                            this.showToast('⚠️ 该卡片尚未配置跳转链接', 1200);
                        }
                    } else {
                        // 原有翻页动画逻辑
                        this.animateAndRedirect(card, item.url);
                    }
                });
                
                front.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.openEditModal(item.id);
                });
                front.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`确定删除「${item.label}」吗？`)) {
                        this.items = this.items.filter(i => i.id !== item.id);
                        this.saveData();
                        this.render();
                        this.showToast(`🗑️ 已删除 ${item.label}`, 1200);
                    }
                });
                this.container.appendChild(card);
            });
        }

        escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        animateAndRedirect(cardElement, targetUrl) {
            if (!cardElement || cardElement.classList.contains('flipping')) return;
            cardElement.classList.add('flipping');
            setTimeout(() => {
                if (targetUrl && targetUrl.trim() !== '') {
                    window.location.href = targetUrl;
                } else {
                    this.showToast('⚠️ 该卡片尚未配置跳转链接', 1200);
                    cardElement.classList.remove('flipping');
                }
            }, 400);
        }

        generateId() {
            return 'card_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        openAddModal() {
            this.editingId = null;
            document.getElementById('modalTitle').innerText = '➕ 添加卡片';
            document.getElementById('cardNameInput').value = '';
            document.getElementById('cardUrlInput').value = '';
            document.getElementById('modalOverlay').classList.add('active');
            window.activeManager = this;
        }

        openEditModal(id) {
            const target = this.items.find(i => i.id === id);
            if (!target) return;
            this.editingId = id;
            document.getElementById('modalTitle').innerText = '✏️ 编辑卡片';
            document.getElementById('cardNameInput').value = target.label;
            document.getElementById('cardUrlInput').value = target.url;
            document.getElementById('modalOverlay').classList.add('active');
            window.activeManager = this;
        }

        saveModalData() {
            let label = document.getElementById('cardNameInput').value.trim();
            let url = document.getElementById('cardUrlInput').value.trim();
            if (!label) { this.showToast('请填写名称', 1500); return; }
            if (this.editingId !== null) {
                const idx = this.items.findIndex(i => i.id === this.editingId);
                if (idx !== -1) {
                    this.items[idx].label = label;
                    this.items[idx].url = url;
                    this.showToast('✅ 已更新', 1200);
                }
            } else {
                this.items.push({ id: this.generateId(), label: label, url: url });
                this.showToast(`✨ 已添加 ${label}`, 1200);
            }
            this.saveData();
            this.render();
            this.closeModal();
        }

        closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            this.editingId = null;
            window.activeManager = null;
        }
    }

    // ==================== 初始化两个管理器 ====================
    // 时光叙事（右侧）- 在当前页面跳转（有翻页动画）
    const timelineManager = new CardManager('monthly_summary_links', 'timelineList', 'openTimelineModalBtn', false);
    // 快捷工具箱（左侧）- 在新标签页打开（无翻页动画，直接打开）
    const toolsManager = new CardManager('quick_tools', 'toolsList', 'openToolsModalBtn', true);

    // 全局模态框回调
    const modalOverlay = document.getElementById('modalOverlay');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');

    function closeModal() {
        if (window.activeManager) {
            window.activeManager.closeModal();
        } else {
            modalOverlay.classList.remove('active');
        }
    }

    modalCancelBtn.addEventListener('click', closeModal);
    modalConfirmBtn.addEventListener('click', () => {
        if (window.activeManager) {
            window.activeManager.saveModalData();
        }
    });
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });

    // 格言卡片复制功能
    document.getElementById('card1')?.addEventListener('click', () => {
        navigator.clipboard.writeText("总有一天，我不会让我的双脚站在油污的地板上");
        toolsManager.showToast("✨ 格言已复制", 1200);
    });
    document.getElementById('card2')?.addEventListener('click', () => {
        navigator.clipboard.writeText("人的本质是赌徒，不赌其实是在赌自己输");
        toolsManager.showToast("🎲 格言已复制", 1200);
    });
</script>
</body>
</html>
