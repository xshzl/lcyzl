<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>格言双生 · 时光叙事</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #05070a;
            background-image: linear-gradient(rgba(30, 35, 50, 0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(30, 35, 50, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(40, 45, 70, 0.3), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========= 页面容器 ========= */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            /* transition: transform 0.19s ease-out; */
            padding: 2rem;
        }

        .page-home {
            z-index: 10;
            transform: translateX(0);
        }

        .page-timeline {
            z-index: 5;
            transform: translateX(100%);
            background: #05070a;
        }

        body.show-timeline .page-home {
            transform: translateX(-100%);
            pointer-events: none;  /* 关键：切换时禁用主页交互，消除卡顿感 */
        }
        body.show-timeline .page-timeline {
            transform: translateX(0);
            z-index: 15;
            pointer-events: auto;
        }

        /* 滚动条 */
        .page::-webkit-scrollbar { width: 6px; }
        .page::-webkit-scrollbar-track { background: #1a1e2a; }
        .page::-webkit-scrollbar-thumb { background: #4f5b8c; border-radius: 8px; }

        /* 返回箭头 */
        .back-arrow {
            position: fixed;
            left: 2rem;
            top: 2rem;
            width: 52px;
            height: 52px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(100, 130, 240, 0.4);
            z-index: 100;
        }
        .back-arrow:hover { transform: scale(1.05); background: rgba(55, 70, 120, 0.9); }
        .back-arrow i { font-size: 1.5rem; color: #c0ceff; }

        /* ========= 格言卡片 ========= */
        .quotes-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding-top: 2rem;
        }

        .quote-card {
            background: rgba(12, 15, 22, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8);
            padding: 2.5rem 2rem;
            transition: transform 0.25s ease, background 0.25s ease;  /* 只保留必要过渡，去掉hover的translateY卡顿源 */
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 2rem;
            cursor: pointer;
        }
        .quote-card:last-child { margin-bottom: 0; }
        .quote-card:hover {
            background: rgba(20, 24, 34, 0.92);
            border-color: rgba(255, 255, 255, 0.15);
            /* 移除 transform: translateY，避免页面切换时的抖动 */
        }
        .quote-icon { font-size: 2.8rem; color: rgba(150, 170, 220, 0.5); margin-bottom: 1rem; }
        .quote-text { font-size: 1.75rem; font-weight: 500; line-height: 1.4; color: #f5f7ff; margin: 1.2rem 0 1rem 0; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3); }
        .quote-divider { width: 70px; height: 3px; background: linear-gradient(90deg, #5f7bc0, #8aa2ff); border-radius: 4px; margin: 1rem 0 1.2rem 0; }
        .quote-meta { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: #9aa9ce; opacity: 0.7; }

        /* 入口箭头 */
        .nav-arrow {
            position: fixed;
            right: 2rem;
            bottom: 2rem;
            width: 68px;
            height: 68px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(100, 130, 240, 0.5);
            z-index: 100;
        }
        .nav-arrow:hover { transform: scale(1.05); background: rgba(55, 70, 120, 0.95); }
        .nav-arrow i { font-size: 2rem; color: #c0ceff; }
        .arrow-label {
            position: fixed;
            right: 6rem;
            bottom: 2.8rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #c0ceff;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .nav-arrow:hover + .arrow-label { opacity: 1; }

        /* ========= 时光叙事页面 ========= */
        .timeline-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 4rem 1rem 2rem;
        }
        .timeline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .timeline-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c0ceff, #8aa2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .add-month-btn {
            background: rgba(100, 130, 240, 0.2);
            border: 1px solid rgba(100, 130, 240, 0.5);
            color: #b8cbff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .add-month-btn:hover { background: rgba(100, 130, 240, 0.5); color: white; transform: scale(1.02); }

        .months-list { display: flex; flex-direction: column; gap: 1rem; }
        .month-card {
            background: rgba(25, 30, 45, 0.6);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            transform-style: preserve-3d;
            perspective: 800px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 1.2rem;
        }
        .month-card.flipping .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-front { background: rgba(25, 30, 45, 0.8); transform: rotateY(0deg); }
        .card-back {
            background: rgba(55, 65, 95, 0.95);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotateY(180deg);
            justify-content: center;
            gap: 0.8rem;
        }
        .month-label { font-weight: 600; font-size: 1rem; color: #eef3ff; display: flex; align-items: center; gap: 8px; }
        .month-label i { color: #8aa2ff; }
        .edit-icon, .delete-icon { color: #9aa9ce; cursor: pointer; padding: 6px; border-radius: 8px; transition: all 0.2s; }
        .edit-icon:hover, .delete-icon:hover { background: rgba(100, 130, 240, 0.3); color: white; }
        .delete-icon:hover { color: #ff8a7a; }
        .card-back span { font-size: 0.85rem; color: #ccd6ff; }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: #0f1220;
            border-radius: 2rem;
            max-width: 450px;
            width: 90%;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-container h3 { color: white; margin-bottom: 1.5rem; }
        .modal-container input {
            width: 100%;
            background: rgba(30, 35, 55, 0.9);
            border: 1px solid #2c3145;
            padding: 12px 16px;
            border-radius: 1rem;
            color: white;
            margin-bottom: 1.2rem;
            outline: none;
        }
        .modal-container input:focus { border-color: #6d86e0; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 1rem; }
        .modal-buttons button {
            padding: 8px 18px;
            border-radius: 40px;
            background: transparent;
            border: 1px solid #4f5b8c;
            color: #ccd6ff;
            cursor: pointer;
        }
        .modal-buttons button.primary { background: #3a4c8c; border-color: #8aa2ff; color: white; }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #11131fcc;
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            color: #eef3ff;
            font-size: 0.85rem;
            z-index: 300;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        @media (max-width: 700px) {
            .quote-text { font-size: 1.45rem; }
            .timeline-container { padding: 5rem 1rem 2rem; }
            .nav-arrow { width: 56px; height: 56px; right: 1.5rem; bottom: 1.5rem; }
            .back-arrow { left: 1.5rem; top: 1.5rem; width: 44px; height: 44px; }
        }
        .quote-author {
    text-align: right;
    font-size: 0.85rem;
    color: #8aa2ff;
    margin-top: 0.8rem;
    opacity: 0.7;
    font-style: italic;
    letter-spacing: 0.5px;
}

.quote-card:hover .quote-author {
    opacity: 1;
    color: #b8cbff;
}
    </style>
</head>
<body>
    <div class="page page-home">
        <div class="quotes-container">
            <div class="quote-card" id="card1">
                <div class="quote-icon"><i class="fas fa-hand-sparkles"></i></div>
                <div class="quote-text">“总有一天，我不会让我的双脚站在油污的地板上”</div>
                <div class="quote-divider"></div>
                <div class="quote-meta"><i class="fas fa-feather-alt"></i><span>蜕 变 · 净 土 宣 言</span></div>
                <div class="quote-author">—— 章鱼哥</div>
            </div>
            <div class="quote-card" id="card2">
                <div class="quote-icon"><i class="fas fa-dice-d6"></i></div>
                <div class="quote-text">“人的本质是赌徒，不赌其实是在赌自己输”</div>
                <div class="quote-divider"></div>
                <div class="quote-meta"><i class="fas fa-brain"></i><span>博 弈 · 存 在 边 界</span></div>
                <div class="quote-author">—— 高桥凉介</div>
            </div>
        </div>
        <div class="nav-arrow" id="gotoTimelineBtn">
            <i class="fas fa-arrow-right"></i>
        </div>
        <div class="arrow-label">时光叙事</div>
    </div>

    <div class="page page-timeline">
        <div class="back-arrow" id="backToHomeBtn">
            <i class="fas fa-arrow-left"></i>
        </div>
        <div class="timeline-container">
            <div class="timeline-header">
                <h2><i class="fas fa-calendar-alt"></i> 时光叙事</h2>
                <div class="add-month-btn" id="openAddModalBtn"><i class="fas fa-plus"></i></div>
            </div>
            <div class="months-list" id="monthsListContainer"></div>
            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.7rem; color: #5f6b8a;">
                <i class="fas fa-arrows-spin"></i> 点击卡片翻页后自动跳转
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-container">
            <h3 id="modalTitle">➕ 添加月度总结</h3>
            <input type="text" id="monthInput" placeholder="月份标识, 例如: 202604 (2026年4月)" autocomplete="off">
            <input type="text" id="linkInput" placeholder="跳转链接, 例如: ./202604.html 或 https://...">
            <div class="modal-buttons">
                <button id="modalCancelBtn">取消</button>
                <button id="modalConfirmBtn" class="primary">确认</button>
            </div>
        </div>
    </div>

    <script>
        // 页面切换
        const gotoBtn = document.getElementById('gotoTimelineBtn');
        const backBtn = document.getElementById('backToHomeBtn');
        
        gotoBtn.addEventListener('click', () => {
            document.body.classList.add('show-timeline');
        });
        
        backBtn.addEventListener('click', () => {
            document.body.classList.remove('show-timeline');
        });

        // 月度数据管理
        let monthItems = [];
        let editingId = null;

        const monthsContainer = document.getElementById('monthsListContainer');
        const modal = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const monthInput = document.getElementById('monthInput');
        const linkInput = document.getElementById('linkInput');
        const openAddBtn = document.getElementById('openAddModalBtn');
        const cancelBtn = document.getElementById('modalCancelBtn');
        const confirmBtn = document.getElementById('modalConfirmBtn');

        function showToast(msg, duration = 2000) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, duration);
        }

        function saveData() {
            localStorage.setItem('monthly_summary_links', JSON.stringify(monthItems));
        }

        function loadData() {
            const stored = localStorage.getItem('monthly_summary_links');
            if (stored) {
                try { monthItems = JSON.parse(stored); } catch(e) { monthItems = []; }
            }
            if (monthItems.length === 0) {
                monthItems.push({ id: '202604', label: '2026年4月', url: './202604.html' });
                monthItems.push({ id: '202605', label: '2026年5月', url: './202605.html' });
                saveData();
            }
            renderMonthList();
        }

        function animateAndRedirect(cardElement, targetUrl) {
            if (!cardElement || cardElement.classList.contains('flipping')) return;
            cardElement.classList.add('flipping');
            setTimeout(() => {
                if (targetUrl && targetUrl.trim() !== '') {
                    window.location.href = targetUrl;
                } else {
                    showToast('⚠️ 该月份尚未配置跳转链接', 1200);
                    cardElement.classList.remove('flipping');
                }
            }, 400);
        }

        function renderMonthList() {
            if (!monthsContainer) return;
            monthsContainer.innerHTML = '';
            if (monthItems.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'month-card';
                emptyDiv.style.padding = '1rem';
                emptyDiv.style.textAlign = 'center';
                emptyDiv.innerHTML = '<span style="opacity:0.6;">✨ 暂无月度总结，点击 + 添加</span>';
                monthsContainer.appendChild(emptyDiv);
                return;
            }
            monthItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'month-card';
                const inner = document.createElement('div');
                inner.className = 'card-inner';
                const front = document.createElement('div');
                front.className = 'card-front';
                front.innerHTML = `
                    <div class="month-label"><i class="far fa-calendar-check"></i> ${escapeHtml(item.label)}</div>
                    <div style="display: flex; gap: 0.3rem;">
                        <i class="fas fa-pen edit-icon" data-action="edit"></i>
                        <i class="fas fa-trash-alt delete-icon" data-action="delete"></i>
                    </div>
                `;
                const back = document.createElement('div');
                back.className = 'card-back';
                back.innerHTML = `<i class="fas fa-arrow-right"></i><span>点击跳转</span><i class="fas fa-external-link-alt"></i>`;
                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);
                card.addEventListener('click', (e) => {
                    if (e.target.closest('[data-action="edit"]') || e.target.closest('[data-action="delete"]')) return;
                    animateAndRedirect(card, item.url);
                });
                front.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditModal(item.id);
                });
                front.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`确定删除「${item.label}」吗？`)) {
                        monthItems = monthItems.filter(i => i.id !== item.id);
                        saveData();
                        renderMonthList();
                        showToast(`🗑️ 已删除 ${item.label}`, 1200);
                    }
                });
                monthsContainer.appendChild(card);
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function generateIdFromLabel(label) {
            let match = label.match(/\d{6}/);
            if (match) return match[0];
            match = label.match(/\d{4}年\d{1,2}月/);
            if (match) {
                let year = match[0].substr(0,4);
                let month = match[0].match(/年(\d{1,2})月/)[1].padStart(2,'0');
                return year + month;
            }
            let digits = label.replace(/\D/g, '');
            if (digits.length >= 6) return digits.substring(0,6);
            return `month_${Date.now()}`;
        }

        function openAddModal() {
            editingId = null;
            modalTitle.innerText = '➕ 添加月度总结';
            monthInput.value = '';
            linkInput.value = '';
            modal.classList.add('active');
        }
        function openEditModal(id) {
            const target = monthItems.find(i => i.id === id);
            if (!target) return;
            editingId = id;
            modalTitle.innerText = '✏️ 编辑月度总结';
            monthInput.value = target.label;
            linkInput.value = target.url;
            modal.classList.add('active');
        }
        function closeModal() { modal.classList.remove('active'); editingId = null; }
        function saveModalData() {
            let rawLabel = monthInput.value.trim();
            let url = linkInput.value.trim();
            if (!rawLabel) { showToast('请填写月份名称', 1500); return; }
            let displayLabel = rawLabel;
            let idValue = generateIdFromLabel(rawLabel);
            if (/^\d{6}$/.test(rawLabel)) {
                let year = rawLabel.slice(0,4);
                let month = rawLabel.slice(4,6);
                displayLabel = `${year}年${parseInt(month)}月`;
            }
            if (editingId !== null) {
                const idx = monthItems.findIndex(i => i.id === editingId);
                if (idx !== -1) { monthItems[idx].label = displayLabel; monthItems[idx].url = url; showToast('✅ 已更新', 1200); }
            } else {
                if (monthItems.find(i => i.id === idValue)) { showToast(`⚠️ 月份 ${idValue} 已存在`, 1500); return; }
                monthItems.push({ id: idValue, label: displayLabel, url: url });
                showToast(`✨ 已添加 ${displayLabel}`, 1200);
            }
            saveData(); renderMonthList(); closeModal();
        }

        document.getElementById('card1')?.addEventListener('click', () => {
            navigator.clipboard.writeText("总有一天，我不会让我的双脚站在油污的地板上");
            showToast("✨ 格言已复制", 1200);
        });
        document.getElementById('card2')?.addEventListener('click', () => {
            navigator.clipboard.writeText("人的本质是赌徒，不赌其实是在赌自己输");
            showToast("🎲 格言已复制", 1200);
        });

        openAddBtn.addEventListener('click', openAddModal);
        cancelBtn.addEventListener('click', closeModal);
        confirmBtn.addEventListener('click', saveModalData);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        loadData();
    </script>
</body>
</html>
